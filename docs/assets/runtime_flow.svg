<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc">
  <title id="title">TAO Data Services runtime dispatch flow</title>
  <desc id="desc">Host tao_ds launcher starts Docker, then package console scripts dispatch subtasks through Hydra-backed script modules.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f6f7a"/>
    </marker>
    <style>
      .box { fill: #f7faf9; stroke: #4f6f7a; stroke-width: 2; rx: 8; }
      .host { fill: #edf7f2; }
      .container { fill: #f5f2ff; }
      .script { fill: #fff7e8; }
      .title { font: 700 18px sans-serif; fill: #1f2a2e; }
      .text { font: 14px sans-serif; fill: #243238; }
      .small { font: 12px sans-serif; fill: #46575f; }
      .line { stroke: #4f6f7a; stroke-width: 2.2; marker-end: url(#arrow); fill: none; }
      .band { fill: #e9eef0; }
    </style>
  </defs>
  <rect x="28" y="28" width="984" height="464" rx="12" fill="#ffffff" stroke="#d6dee2"/>
  <rect x="50" y="60" width="280" height="380" rx="10" class="band"/>
  <rect x="380" y="60" width="280" height="380" rx="10" class="band"/>
  <rect x="710" y="60" width="250" height="380" rx="10" class="band"/>
  <text x="70" y="92" class="title">Host</text>
  <text x="400" y="92" class="title">Container Package</text>
  <text x="730" y="92" class="title">Task Runtime</text>

  <rect x="75" y="125" width="230" height="72" class="box host"/>
  <text x="95" y="154" class="text">source scripts/envsetup.sh</text>
  <text x="95" y="176" class="small">sets NV_TAO_DS_TOP and tao_ds</text>

  <rect x="75" y="245" width="230" height="82" class="box host"/>
  <text x="95" y="275" class="text">runner/tao_ds.py</text>
  <text x="95" y="297" class="small">reads manifest, mounts /workspace</text>
  <text x="95" y="316" class="small">adds GPUs, shm, ulimits, env</text>

  <rect x="405" y="125" width="230" height="82" class="box container"/>
  <text x="425" y="155" class="text">setup.py console_scripts</text>
  <text x="425" y="177" class="small">annotations, augmentation,</text>
  <text x="425" y="196" class="small">analytics, auto_label, more</text>

  <rect x="405" y="255" width="230" height="82" class="box container"/>
  <text x="425" y="285" class="text">entrypoint wrapper</text>
  <text x="425" y="307" class="small">discovers scripts subtasks</text>
  <text x="425" y="326" class="small">maps -e spec to Hydra args</text>

  <rect x="735" y="125" width="200" height="82" class="box script"/>
  <text x="755" y="155" class="text">scripts/&lt;subtask&gt;.py</text>
  <text x="755" y="177" class="small">@hydra_runner</text>
  <text x="755" y="196" class="small">task logic</text>

  <rect x="735" y="255" width="200" height="82" class="box script"/>
  <text x="755" y="285" class="text">experiment specs</text>
  <text x="755" y="307" class="small">YAML examples plus</text>
  <text x="755" y="326" class="small">dataclass schemas</text>

  <rect x="405" y="365" width="530" height="52" class="box"/>
  <text x="425" y="396" class="text">GPU overrides, telemetry, logs, API queue workers, and outputs</text>

  <path d="M190 197 L190 245" class="line"/>
  <path d="M305 286 L405 166" class="line"/>
  <path d="M635 166 L735 166" class="line"/>
  <path d="M835 207 L835 255" class="line"/>
  <path d="M520 337 L520 365" class="line"/>
  <path d="M835 337 L835 365" class="line"/>
</svg>
